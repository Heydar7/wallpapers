name: wallpaper
description: "4K & Live Wallpapers."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.9
  iconly: ^1.0.1
  animated_flip_counter: ^0.3.4
  lottie: ^3.3.3
  flutter_svg: ^2.3.0
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  smooth_page_indicator: ^2.0.1
  pull_down_button: ^0.10.2
  pinch_zoom: ^2.0.1
  pinput: ^6.0.2

  # Styling
  google_fonts: ^8.1.0

  # Navigation
  go_router: ^17.2.3

  # Storage & State
  shared_preferences: ^2.5.5

  # Firebase
  firebase_core: ^4.8.0
  cloud_firestore: ^6.4.0
  firebase_storage: ^13.4.0
  firebase_messaging: ^16.2.1

  # Media & Files
  image_picker: ^1.1.2

  # Network & Utilities
  http: ^1.3.0
  url_launcher: ^6.3.1
  ntp: ^2.0.0
  intl: ^0.20.2
  webview_flutter: ^4.10.0
  dio: ^5.0.0
  cached_network_image: ^3.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/svg/
    - assets/ai-styles/

  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SFPro/SF-Pro-Display-Light.otf
          weight: 300
        - asset: assets/fonts/SFPro/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/fonts/SFPro/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/fonts/SFPro/SF-Pro-Display-Semibold.otf
          weight: 600
